# asset-inventory.yaml
# Produced in Phase 1. Every file in the source project has an entry here.
# No file is skipped. Unknown files get strategy: preserve with a note.

# migration_strategy values:
#   translate       → rewrite in target language
#   adapt           → keep structure, update language-specific content (CI, build files)
#   direct_use      → copy as-is (test data, binary assets, config files)
#   preserve        → keep unchanged; role unclear but non-zero value assumed
#   reference_only  → not migrated, but must be read during P3 IPO analysis (docs, notes)
#   generated       → will be auto-generated by target toolchain (e.g., lock files)

meta:
  scanned_at: ""
  total_files: 0
  by_strategy:
    translate: 0
    adapt: 0
    direct_use: 0
    preserve: 0
    reference_only: 0
    generated: 0

assets: []
# Each entry:
# - path: "relative/path/from/source/root"
#   type: ""            # source_code | test_code | test_fixture | build_config
#                       # ci_config | documentation | asset_binary | asset_text
#                       # dependency_manifest | environment_config | script | other
#   purpose: ""         # one-line description of what this file does
#   migration_strategy: ""
#   depends_on_ecosystem: []   # list of imports/libs this file uses (filled in P2)
#   status: TODO        # TODO | DONE | BLOCKED | SKIPPED(never used — use preserve instead)
#   target_path: ""     # where the translated file will go (empty if not translate/adapt)
#   notes: ""           # any relevant notes, including why preserve was chosen
#   p3_required: false  # must be read during IPO analysis phase
